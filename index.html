<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSG & Associate's Tally Debtor Automator(Built by AR)</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg-color: #F9F6F0;
      --container-bg: #FFFFFF;
      --text-color: #333333;
      --accent-color: #8C7B65;
      --border-color: #E2DDD5;
      --label-color: #555555;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    .container {
      background-color: var(--container-bg);
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      max-width: 1000px;
      /* Widened to fit 3 columns comfortably */
      width: 100%;
    }

    .header-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 10px;
    }

    .header-bar img.logo {
      height: 56px;
      width: auto;
      flex-shrink: 0;
    }

    h2 {
      margin-top: 0;
      margin-bottom: 0;
      font-weight: 500;
      color: var(--text-color);
      padding-bottom: 10px;
    }

    p.instructions {
      font-size: 14px;
      color: #666;
      margin-bottom: 25px;
      line-height: 1.6;
    }

    /* 3-Column Grid Layout */
    .grid-container {
      display: grid;
      grid-template-columns: 1fr 1fr 1.5fr;
      /* Address gets slightly more space */
      gap: 15px;
      margin-bottom: 25px;
    }

    .column-box {
      display: flex;
      flex-direction: column;
    }

    label {
      font-size: 13px;
      font-weight: 600;
      color: var(--label-color);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    textarea {
      width: 100%;
      height: 250px;
      padding: 12px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      background-color: #FAFAFA;
      font-family: monospace;
      font-size: 13px;
      resize: none;
      /* Disabled manual resize to keep columns aligned */
      box-sizing: border-box;
      white-space: pre;
      overflow-x: auto;
      line-height: 1.5;
    }

    textarea:focus {
      outline: none;
      border-color: var(--accent-color);
      background-color: #FFF;
      box-shadow: 0 0 0 2px rgba(140, 123, 101, 0.1);
    }

    button {
      background-color: var(--accent-color);
      color: white;
      border: none;
      padding: 14px 24px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.2s ease;
      width: 100%;
      font-weight: 500;
    }

    button:hover {
      background-color: #7A6953;
    }

    .header-divider {
      border-bottom: 2px solid var(--border-color);
      margin-bottom: 25px;
    }

    #status {
      margin-top: 15px;
      font-size: 14px;
      text-align: center;
      font-weight: 500;
    }
  </style>
</head>

    <div class="header-divider"></div>
    <p class="instructions">
      Select 3 columns (Name, GSTIN, Address) in Excel, copy them, and <strong>paste into any box below</strong>. <br>
      The app will automatically distribute the data into the correct columns.
    </p>

    <div class="grid-container">
      <div class="column-box">
        <label>Company Name</label>
        <textarea id="colName" placeholder="e.g. Reliance Industries"></textarea>
      </div>
      <div class="column-box">
        <label>GSTIN Number</label>
        <textarea id="colGSTIN" placeholder="e.g. 27ABCDE1234F1Z5"></textarea>
      </div>
      <div class="column-box">
        <label>Full Address</label>
        <textarea id="colAddress" placeholder="e.g. Maker Chambers IV, Mumbai 400021"></textarea>
      </div>

    <button id="generateBtn" onclick="processData()">Format Data & Generate Excel</button>
    <div id="status"></div>
  </div>

  <script>
    const gstStateCodes = {
      "01": "Jammu & Kashmir", "02": "Himachal Pradesh", "03": "Punjab", "04": "Chandigarh",
      "05": "Uttarakhand", "06": "Haryana", "07": "Delhi", "08": "Rajasthan", "09": "Uttar Pradesh",
      "10": "Bihar", "11": "Sikkim", "12": "Arunachal Pradesh", "13": "Nagaland", "14": "Manipur",
      "15": "Mizoram", "16": "Tripura", "17": "Meghalaya", "18": "Assam", "19": "West Bengal",
      "20": "Jharkhand", "21": "Odisha", "22": "Chhattisgarh", "23": "Madhya Pradesh", "24": "Gujarat",
      "25": "Daman & Diu", "26": "Dadra & Nagar Haveli", "27": "Maharashtra", "29": "Karnataka",
      "30": "Goa", "31": "Lakshadweep", "32": "Kerala", "33": "Tamil Nadu", "34": "Puducherry",
      "35": "Andaman & Nicobar Islands", "36": "Telangana", "37": "Andhra Pradesh", "38": "Ladakh"
    };

    // --- 1. Smart Paste Interceptor & Scroll Sync ---
    const textareas = document.querySelectorAll('textarea');

    // Sync scrolling so they act like a unified table
    textareas.forEach(ta => {
      ta.addEventListener('scroll', (e) => {
        textareas.forEach(other => {
          if (other !== e.target) {
            other.scrollTop = e.target.scrollTop;
          }
        });
      });
    });

    // Intercept Paste events anywhere in the app
    document.addEventListener('paste', (e) => {
      const clipboardData = e.clipboardData || window.clipboardData;
      const pastedData = clipboardData.getData('Text');

      // If data contains tabs, it's likely copied from Excel columns
      if (pastedData.includes('\t')) {
        e.preventDefault(); // Stop default single-box pasting

        const rows = pastedData.split('\n');
        let names = [], gstins = [], addresses = [];

        rows.forEach(row => {
          const cols = row.split('\t');
          // Ensure the row isn't just an empty new line
          if (row.trim() !== '') {
            names.push(cols[0] ? cols[0].trim() : "");
            gstins.push(cols[1] ? cols[1].trim() : "");
            addresses.push(cols[2] ? cols[2].trim() : "");
          }
        });

        document.getElementById('colName').value = names.join('\n');
        document.getElementById('colGSTIN').value = gstins.join('\n');
        document.getElementById('colAddress').value = addresses.join('\n');
      }
    });

    // --- 2. Data Processing ---
    function processData() {
      const names = document.getElementById('colName').value.split('\n');
      const gstins = document.getElementById('colGSTIN').value.split('\n');
      const addresses = document.getElementById('colAddress').value.split('\n');
      const statusDiv = document.getElementById('status');

      const maxRows = Math.max(names.length, gstins.length, addresses.length);
      const finalData = [];
      let validRecords = 0;

      for (let i = 0; i < maxRows; i++) {
        const companyName = (names[i] || "").trim();
        const gstin = (gstins[i] || "").trim();
        const fullAddress = (addresses[i] || "").trim();

        if (!companyName && !gstin && !fullAddress) continue; // Skip empty rows

        if (companyName && gstin) {
          const pan = gstin.length >= 15 ? gstin.substring(2, 12) : "";
          const stateCode = gstin.substring(0, 2);
          const stateName = gstStateCodes[stateCode] || "Unknown State";

          const pinMatch = fullAddress.match(/\b\d{6}\b/);
          const pin = pinMatch ? pinMatch[0] : "";

          // --- Distribute address evenly into 3 lines ---
          let addr1 = "", addr2 = "", addr3 = "";
          if (fullAddress) {
            const words = fullAddress.split(/\s+/).filter(w => w);
            const n = words.length;
            const size1 = Math.ceil(n / 3);
            const size2 = Math.ceil((n - size1) / 2);

            addr1 = words.slice(0, size1).join(" ");
            addr2 = words.slice(size1, size1 + size2).join(" ");
            addr3 = words.slice(size1 + size2).join(" ");
          }

          finalData.push({
            "Name": companyName,
            "Under": "Sundry Debtors",
            "Mailing Name": companyName,
            "Address line 1": addr1,
            "Address line 2": addr2,
            "Address line 3": addr3,
            "State": stateName,
            "Country": "India",
            "PIN Code": pin,
            "Registration Type": "Regular",
            "GSTIN/UIN": gstin,
            "PAN No.": pan
          });
          validRecords++;
        }
      }

      if (validRecords === 0) {
        statusDiv.innerHTML = "<span style='color: red;'>No valid data found. Please paste your data.</span>";
        return;
      }

      generateExcel(finalData);
      statusDiv.innerHTML = `<span style='color: green;'>Success! Excel file generated for ${validRecords} records.</span>`;
    }

    // --- 3. Excel Generation ---
    function generateExcel(data) {
      const worksheet = XLSX.utils.json_to_sheet(data);
      const workbook = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(workbook, worksheet, "Sundry Debtors");

      // Updated widths: The single address width of 50 was replaced with three 30-character widths
      const colWidths = [
        { wch: 30 }, { wch: 20 }, { wch: 30 },
        { wch: 30 }, { wch: 30 }, { wch: 30 }, // Address 1, 2, and 3
        { wch: 20 }, { wch: 15 }, { wch: 15 }, { wch: 20 },
        { wch: 20 }, { wch: 15 }
      ];
      worksheet['!cols'] = colWidths;

      XLSX.writeFile(workbook, "Tally_Debtors_Format.xlsx");
    }
  </script>
